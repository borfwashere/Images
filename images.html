<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borf Images Program</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Tahoma', sans-serif;
            background-color: var(--win-gray);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- VISTA DE EXPLORADOR (GRILLA) --- */
        #explorerView {
            flex: 1;
            padding: 20px;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            overflow-y: auto;
            border: 2px inset var(--win-border-light);
            margin: 5px;
        }

        .img-card {
            width: 140px;
            cursor: pointer;
            text-align: center;
        }

        .img-card .thumb-box {
            width: 130px;
            height: 110px;
            background: #eee;
            border: 1px solid var(--win-border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 2px 2px 0 #000;
            margin-bottom: 5px;
        }

        .img-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .img-card span {
            font-size: 11px;
            display: block;
            word-break: break-all;
            color: #000;
        }

        /* --- VISTA DE VISOR (PANTALLA COMPLETA) --- */
        #photoViewer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: none; /* Oculto por defecto */
            flex-direction: column;
            z-index: 1000;
        }

        .viewer-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #mainImage {
            max-width: 98%;
            max-height: 98%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .viewer-controls {
            height: 45px;
            background: var(--win-gray);
            border-top: 2px solid var(--win-border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .win-btn {
            padding: 4px 15px;
            background: var(--win-gray);
            border: 2px outset var(--win-border-light);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .win-btn:active { border: 2px inset var(--win-border-light); }

        .info-text { font-size: 11px; color: #000; }

        /* Scrollbar Retro */
        #explorerView::-webkit-scrollbar { width: 16px; }
        #explorerView::-webkit-scrollbar-track { background: #dfdfdf; }
        #explorerView::-webkit-scrollbar-thumb {
            background: var(--win-gray);
            border: 2px outset var(--win-border-light);
        }
    </style>
</head>
<body>

    <div id="explorerView">
        </div>

    <div id="photoViewer">
        <div class="viewer-stage" onclick="toggleZoom()">
            <img id="mainImage" src="" alt="View">
        </div>
        <div class="viewer-controls">
            <div>
                <button class="win-btn" onclick="closeViewer()">Cerrar</button>
            </div>
            <div>
                <button class="win-btn" onclick="navImage(-1)">Anterior</button>
                <span class="info-text" id="counterDisplay">0 / 0</span>
                <button class="win-btn" onclick="navImage(1)">Siguiente</button>
            </div>
            <div id="fileNameDisplay" class="info-text">NombreArchivo.jpg</div>
        </div>
    </div>

    <script>
        let imagesData = [];
        let currentIndex = 0;

        const explorer = document.getElementById('explorerView');
        const viewer = document.getElementById('photoViewer');
        const mainImage = document.getElementById('mainImage');
        const counterText = document.getElementById('counterDisplay');
        const nameText = document.getElementById('fileNameDisplay');

        // INICIALIZACIÓN: Cargar index.json del mismo repo
        async function init() {
            try {
                // Buscamos el index.json relativo a la ubicación de este archivo
                const response = await fetch('index.json');
                imagesData = await response.json();
                renderExplorer();
            } catch (error) {
                explorer.innerHTML = `<div style="padding:20px; color:red;">
                    Error: No se encontró el archivo index.json en el repositorio.<br>
                    Asegúrate de que el JSON contenga un array de nombres de archivos.
                </div>`;
            }
        }

        function renderExplorer() {
            explorer.innerHTML = "";
            imagesData.forEach((fileName, index) => {
                const card = document.createElement('div');
                card.className = 'img-card';
                card.onclick = () => openViewer(index);
                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="${fileName}" loading="lazy">
                    </div>
                    <span>${fileName}</span>
                `;
                explorer.appendChild(card);
            });
        }

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            viewer.style.display = "flex";
        }

        function closeViewer() {
            viewer.style.display = "none";
        }

        function updateViewer() {
            const fileName = imagesData[currentIndex];
            mainImage.src = fileName;
            nameText.innerText = fileName;
            counterText.innerText = `${currentIndex + 1} / ${imagesData.length}`;
        }

        function navImage(step) {
            currentIndex += step;
            if (currentIndex >= imagesData.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = imagesData.length - 1;
            updateViewer();
        }

        function toggleZoom() {
            // Simple toggle entre ajustar y tamaño real
            if (mainImage.style.maxHeight === "none") {
                mainImage.style.maxHeight = "98%";
                mainImage.style.maxWidth = "98%";
                mainImage.style.cursor = "zoom-in";
            } else {
                mainImage.style.maxHeight = "none";
                mainImage.style.maxWidth = "none";
                mainImage.style.cursor = "zoom-out";
            }
        }

        // Teclado
        window.addEventListener('keydown', (e) => {
            if (viewer.style.display === "flex") {
                if (e.key === "ArrowRight") navImage(1);
                if (e.key === "ArrowLeft") navImage(-1);
                if (e.key === "Escape") closeViewer();
            }
        });

        init();
    </script>
</body>
</html>
