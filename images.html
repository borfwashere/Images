<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #fff; font-family: 'Tahoma', sans-serif; padding: 10px; overflow-x: hidden; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .item { width: 100px; cursor: pointer; text-align: center; }
        .item:hover .thumb { border-color: #000080; background: #e5e5ff; }
        .item:hover .name { background: #000080; color: #fff; }
        .thumb { width: 100px; height: 80px; border: 1px solid #808080; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f0f0f0; transition: 0.1s; }
        .thumb img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; image-rendering: pixelated; }
        .name { font-size: 10px; margin-top: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 1px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="grid"></div>
    <script>
        const API = "https://api.github.com/repos/borfwashere/Images/contents/";
        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const photos = data.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
                const container = document.getElementById('grid');
                photos.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'item';
                    d.onclick = () => window.parent.postMessage({action: 'view', url: p.download_url, name: p.name}, '*');
                    d.innerHTML = `<div class="thumb"><img src="${p.download_url}"></div><span class="name">${p.name}</span>`;
                    container.appendChild(d);
                });
            } catch (e) { console.error("Error cargando repositorio"); }
        }
        load();
    </script>
</body>
</html>
