<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borf Private Files</title>
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue-dark: #000080; 
            --win-blue-light: #1084d0; /* El azul claro para el degradado estilo Matrix */
            --viewer-width: 750px; 
            --viewer-height: 580px;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-user-drag: none; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #fff; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
            position: relative;
        }

        /* Explorador de archivos (Fondo Blanco) */
        #explorer { 
            flex: 1; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            overflow-y: auto; 
            background: #fff;
            z-index: 1;
        }
        
        .file-item { 
            width: 110px; 
            text-align: center; 
            cursor: pointer; 
            padding: 5px;
            border: 1px solid transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .file-item:hover .icon-plate { border-color: var(--win-blue-dark); }
        .file-item:hover .file-name { color: var(--win-blue-dark); text-decoration: underline; }
        
        .icon-plate { 
            width: 100px; height: 80px; 
            background: #fdfdfd; 
            border: 1px solid var(--win-border-dark); 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; pointer-events: none;
        }
        
        .icon-plate img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .file-name { font-size: 10px; margin-top: 5px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #000; }

        /* --- VENTANA DEL VISOR CON DEGRADADO --- */
        #viewerWin { 
            position: fixed; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            width: var(--viewer-width);
            height: var(--viewer-height);
            max-width: 95vw;
            max-height: 90vh;
            background: var(--win-gray);
            border: 3px outset var(--win-border-light);
            display: none; 
            flex-direction: column; 
            z-index: 1000;
            box-shadow: 8px 8px 25px rgba(0,0,0,0.6);
        }

        .win-title { 
            /* EFECTO DEGRADADO MATRIX/WIN98 */
            background: linear-gradient(90deg, var(--win-blue-dark) 0%, var(--win-blue-light) 100%);
            color: white; 
            padding: 3px 4px 3px 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            font-size: 12px; 
            letter-spacing: 0.5px;
        }
        
        .close-btn { 
            width: 16px; height: 14px; 
            background: var(--win-gray); 
            border: 2px outset #fff; 
            color: black; 
            font-size: 9px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-weight: bold;
        }
        .close-btn:active { border: 2px inset #fff; padding: 1px 0 0 1px; }

        .win-body { 
            flex: 1; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 5px;
            border: 2px inset var(--win-border-dark); /* Borde hundido para la zona de la foto */
            margin: 2px;
        }
        
        #activeImg { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }

        .win-footer { 
            padding: 6px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--win-gray); 
        }
        
        .nav-btn { 
            height: 22px; 
            padding: 0 12px; 
            background: var(--win-gray); 
            border: 2px outset #fff; 
            font-family: 'Tahoma'; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .nav-btn:active { border: 2px inset #fff; }
        .counter-label { font-size: 11px; font-weight: bold; color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="explorer">
        <div style="color: #808080; padding: 20px; font-size: 11px;">Accediendo a la base de datos de Borsec...</div>
    </div>

    <div id="viewerWin">
        <div class="win-title">
            <span id="winTitleText">Image Viewer</span>
            <div class="close-btn" onclick="closeViewer()">X</div>
        </div>
        <div class="win-body">
            <img id="activeImg" src="">
        </div>
        <div class="win-footer">
            <button class="nav-btn" onclick="nav(-1)">Anterior</button>
            <span id="counter" class="counter-label">0 / 0</span>
            <button class="nav-btn" onclick="nav(1)">Siguiente</button>
        </div>
    </div>

    <script>
        const API = "https://api.github.com/repos/borfwashere/Images/contents/";
        let photos = [];
        let currentIdx = 0;

        async function init() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                photos = data.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i))
                             .map(f => ({ name: f.name, url: f.download_url }));
                render();
            } catch (e) {
                document.getElementById('explorer').innerHTML = "Error cargando archivos.";
            }
        }

        function render() {
            const exp = document.getElementById('explorer');
            exp.innerHTML = "";
            photos.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.onclick = () => openViewer(i);
                item.innerHTML = `
                    <div class="icon-plate"><img src="${p.url}"></div>
                    <span class="file-name">${p.name}</span>
                `;
                exp.appendChild(item);
            });
        }

        function openViewer(index) {
            currentIdx = index;
            const img = document.getElementById('activeImg');
            img.src = photos[currentIdx].url;
            document.getElementById('winTitleText').innerText = photos[currentIdx].name;
            document.getElementById('counter').innerText = `${currentIdx + 1} / ${photos.length}`;
            document.getElementById('viewerWin').style.display = "flex";
        }

        function closeViewer() {
            document.getElementById('viewerWin').style.display = "none";
            document.getElementById('activeImg').src = "";
        }

        function nav(step) {
            currentIdx = (currentIdx + step + photos.length) % photos.length;
            openViewer(currentIdx);
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewerWin').style.display === "flex") {
                if (e.key === "ArrowRight") nav(1);
                if (e.key === "ArrowLeft") nav(-1);
                if (e.key === "Escape") closeViewer();
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());

        init();
    </script>
</body>
</html>
