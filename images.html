<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borf Private Gallery</title>
    <style>
        :root { --win-gray: #c0c0c0; --win-border-light: #ffffff; --win-border-dark: #808080; }
        
        /* Bloqueo de selección y cursor */
        * { 
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #fff; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        #explorerView { 
            flex: 1; padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; overflow-y: auto; 
        }

        .img-item { width: 150px; cursor: pointer; text-align: center; padding: 5px; }
        .img-item:hover { background-color: #000080; color: #fff; }

        .thumb-container { 
            width: 140px; height: 120px; background: #f0f0f0; 
            border: 1px solid var(--win-border-dark); 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; pointer-events: none; /* Evita que toquen la imagen */
        }

        .thumb-container img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .img-name { font-size: 11px; margin-top: 5px; display: block; }

        /* Visor Seguro */
        #photoViewer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; flex-direction: column; z-index: 9999; 
        }

        .viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #activeImage { 
            max-width: 100%; max-height: 100%; 
            pointer-events: none; /* Imposible hacer click derecho o arrastrar */
        }

        .viewer-footer { 
            height: 40px; background: var(--win-gray); 
            border-top: 2px solid var(--win-border-light); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; 
        }

        .btn-win { 
            height: 24px; padding: 0 12px; background: var(--win-gray); 
            border: 2px outset var(--win-border-light); 
            font-size: 11px; font-weight: bold; cursor: pointer; 
        }
        .btn-win:active { border: 2px inset var(--win-border-light); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="explorerView">
        <div id="status" style="padding:20px;">Iniciando sistema de archivos...</div>
    </div>

    <div id="photoViewer">
        <div class="viewer-body" onclick="nav(1)">
            <img id="activeImage" src="" alt="">
        </div>
        <div class="viewer-footer">
            <button class="btn-win" onclick="closeViewer()">CERRAR</button>
            <div>
                <button class="btn-win" onclick="nav(-1)">ANT</button>
                <span id="counter" style="font-size:11px; margin: 0 10px;">0 / 0</span>
                <button class="btn-win" onclick="nav(1)">SIG</button>
            </div>
            <div id="fileName" style="font-size:10px; width:100px; text-align:right;"></div>
        </div>
    </div>

    <script>
        const GITHUB_API = "https://api.github.com/repos/borfwashere/Images/contents/";
        let photos = [];
        let currentIdx = 0;

        // --- PROTECCIÓN EXTRA ---
        document.addEventListener('keydown', (e) => {
            // Bloquea F12, Ctrl+U, Ctrl+S, Ctrl+P
            if (e.keyCode == 123 || (e.ctrlKey && [85, 83, 80].includes(e.keyCode))) {
                e.preventDefault();
                return false;
            }
        });

        // Pantalla completa al primer click (Requerido por navegadores)
        document.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
        }, { once: true });

        async function scan() {
            try {
                const res = await fetch(GITHUB_API);
                const data = await res.json();
                photos = data.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i))
                              .map(f => ({ name: f.name, url: f.download_url }));
                render();
            } catch (e) { document.getElementById('status').innerText = "Error de acceso."; }
        }

        function render() {
            const ev = document.getElementById('explorerView');
            ev.innerHTML = "";
            photos.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'img-item';
                d.onclick = () => open(i);
                d.innerHTML = `<div class="thumb-container"><img src="${p.url}"></div><span class="img-name">${p.name}</span>`;
                ev.appendChild(d);
            });
        }

        function open(i) {
            currentIdx = i;
            document.getElementById('activeImage').src = photos[currentIdx].url;
            document.getElementById('fileName').innerText = photos[currentIdx].name;
            document.getElementById('counter').innerText = `${currentIdx + 1} / ${photos.length}`;
            document.getElementById('photoViewer').style.display = "flex";
        }

        function closeViewer() { document.getElementById('photoViewer').style.display = "none"; }

        function nav(step) {
            currentIdx = (currentIdx + step + photos.length) % photos.length;
            open(currentIdx);
        }

        scan();
    </script>
</body>
</html>
