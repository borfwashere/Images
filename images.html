<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borf Private Files</title>
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue: #000080; 
            /* Proporción fija del visor (puedes ajustar estos valores) */
            --viewer-width: 700px; 
            --viewer-height: 550px;
        }
        
        /* BLOQUEO TOTAL DE SELECCIÓN VISUAL (Como pediste, ya no se ve azul) */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-user-drag: none; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #fff; /* Fondo blanco puro */
            overflow: hidden; 
            display: flex; flex-direction: column; 
            position: relative;
        }

        /* Contenedor principal de la carpeta */
        #explorer { 
            flex: 1; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            overflow-y: auto; 
            background: #fff;
            z-index: 1; /* Fondo blanco */
        }
        
        /* Items de archivos limpios (Hover sutil) */
        .file-item { 
            width: 110px; 
            text-align: center; 
            cursor: pointer; 
            padding: 5px;
            border: 1px solid transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Hover elegante, sin bloques azules */
        .file-item:hover .icon-plate {
            border-color: var(--win-blue);
        }
        .file-item:hover .file-name {
            color: var(--win-blue);
            text-decoration: underline;
        }
        
        .icon-plate { 
            width: 100px; 
            height: 80px; 
            background: #fdfdfd; 
            border: 1px solid var(--win-border-dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            pointer-events: none;
        }
        
        .icon-plate img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }
        
        .file-name { 
            font-size: 10px; 
            margin-top: 5px; 
            width: 100%;
            display: block; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            color: #000;
        }

        /* --- NUEVA VENTANA DEL VISOR FLOTANTE --- */
        #viewerWin { 
            position: fixed; 
            /* Centrado absoluto */
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            
            /* Proporción fija */
            width: var(--viewer-width);
            height: var(--viewer-height);
            
            /* Capacidad de respuesta para pantallas pequeñas */
            max-width: 95vw;
            max-height: 90vh;
            
            background: var(--win-gray);
            border: 3px outset var(--win-border-light); /* Borde Win98 grueso */
            display: none; 
            flex-direction: column; 
            z-index: 1000; /* Encima de la carpeta */
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5); /* Sombra para dar profundidad */
        }

        .win-title { 
            background: var(--win-blue); 
            color: white; 
            padding: 3px 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            font-size: 12px; 
            cursor: move; /* Indica que se puede mover (aunque no tenga drag activo) */
        }
        
        .close-btn { 
            width: 18px; height: 16px; 
            background: var(--win-gray); 
            border: 2px outset #fff; 
            color: black; 
            font-size: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-weight: bold;
        }
        .close-btn:active { border: 2px inset #fff; padding: 1px 0 0 1px; }

        .win-body { 
            flex: 1; 
            background: #000; /* Fondo negro para la foto */
            overflow: hidden; /* No queremos scroll aquí */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; /* Margen para que la foto no toque el borde */
        }
        
        #activeImg { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* Mantiene proporción siempre */
            pointer-events: none; /* Imposible guardar o arrastrar */
        }

        .win-footer { 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--win-gray); 
            border-top: 2px solid var(--win-border-dark); 
        }
        
        .nav-btn { 
            height: 25px; 
            padding: 0 15px; 
            background: var(--win-gray); 
            border: 2px outset #fff; 
            font-family: 'Tahoma'; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .nav-btn:active { border: 2px inset #fff; }
        .counter-label { font-size: 11px; font-weight: bold; color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="explorer">
        <div style="color: #808080; padding: 20px; font-size: 11px;">Buscando fotos en el repositorio...</div>
    </div>

    <div id="viewerWin">
        <div class="win-title">
            <span id="winTitleText">Borf Viewer</span>
            <div class="close-btn" onclick="closeViewer()">X</div>
        </div>
        <div class="win-body">
            <img id="activeImg" src="">
        </div>
        <div class="win-footer">
            <button class="nav-btn" onclick="nav(-1)">ANT</button>
            <span id="counter" class="counter-label">0 / 0</span>
            <button class="nav-btn" onclick="nav(1)">SIG</button>
        </div>
    </div>

    <script>
        const API = "https://api.github.com/repos/borfwashere/Images/contents/";
        let photos = [];
        let currentIdx = 0;

        async function init() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                // Filtramos archivos de imagen
                photos = data.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i))
                             .map(f => ({ name: f.name, url: f.download_url }));
                render();
            } catch (e) {
                document.getElementById('explorer').innerHTML = "Error de conexión con GitHub.";
            }
        }

        function render() {
            const exp = document.getElementById('explorer');
            exp.innerHTML = "";
            if (photos.length === 0) {
                exp.innerHTML = "<div style='padding:20px; color:#000;'>No hay imágenes en este repositorio.</div>";
                return;
            }
            photos.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.onclick = () => openViewer(i);
                item.innerHTML = `
                    <div class="icon-plate"><img src="${p.url}"></div>
                    <span class="file-name">${p.name}</span>
                `;
                exp.appendChild(item);
            });
        }

        function openViewer(index) {
            currentIdx = index;
            const img = document.getElementById('activeImg');
            img.src = photos[currentIdx].url;
            document.getElementById('winTitleText').innerText = photos[currentIdx].name;
            document.getElementById('counter').innerText = `${currentIdx + 1} / ${photos.length}`;
            // Mostramos la ventana flotante
            document.getElementById('viewerWin').style.display = "flex";
        }

        function closeViewer() {
            document.getElementById('viewerWin').style.display = "none";
            document.getElementById('activeImg').src = "";
        }

        function nav(step) {
            currentIdx = (currentIdx + step + photos.length) % photos.length;
            openViewer(currentIdx);
        }

        // Bloqueo de teclado (Esc para cerrar, flechas para navegar)
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('viewerWin').style.display === "flex") {
                if (e.key === "ArrowRight") nav(1);
                if (e.key === "ArrowLeft") nav(-1);
                if (e.key === "Escape") closeViewer();
            }
        });

        // Bloqueo total de click derecho
        document.addEventListener('contextmenu', e => e.preventDefault());

        init();
    </script>
</body>
</html>
